<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omni-Stack Visualizer: SOAR AUTOMATION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --cloud: #00f3ff;
            --primary: #00e5ffd1;
            --danger: #ff1744;
            --warning: #ffea00;
            --cyan-glow: rgba(0, 243, 255, 0.6);
        }

        @keyframes dataRain {
            0% { background-position: 0px 0px, 0px 0px, 0px 0px; }
            100% { background-position: 0px 1000px, 0px 800px, 0px 400px; }
        }

        html, body {
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            overflow: hidden; background-color: #010308 !important;
            cursor: crosshair; font-family: 'Rajdhani', sans-serif; 
            color: var(--primary); user-select: none;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(180deg, rgba(0, 243, 255, 0) 0%, rgba(0, 243, 255, 0.15) 50%, rgba(0, 243, 255, 0) 100%),
                linear-gradient(180deg, rgba(0, 100, 255, 0) 0%, rgba(0, 100, 255, 0.1) 50%, rgba(0, 100, 255, 0) 100%),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 3px 200px, 5px 400px, 40px 100%;
            z-index: 0; pointer-events: none; animation: dataRain 8s linear infinite;
        }

        body::after {
            content: ""; position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background-image: radial-gradient(rgba(0, 243, 255, 0.08) 1px, transparent 1px);
            background-size: 20px 20px; z-index: 0; pointer-events: none;
        }
        
        .scanlines { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); 
            background-size: 100% 4px; pointer-events: none; z-index: 90; 
        }
        
        #hud-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .arc-title { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            text-align: center; font-size: 24px; font-weight: 700; letter-spacing: 5px; 
            text-shadow: 0 0 15px var(--cyan-glow); border-top: 2px solid var(--primary); 
            border-radius: 50% 50% 0 0 / 100% 100% 0 0; padding: 12px 180px 0 180px; 
            color: #d0fbff; text-transform: uppercase; white-space: nowrap; 
        }

        .gauges-arc { position: absolute; top: 750px; left: 50%; width: 0; height: 0; z-index: 100; }
        
        .gauge-wrapper { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            width: 140px; top: 0; left: 0; margin-top: -65px; margin-left: -70px;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, visibility 0.4s;
        }

        .gauge-label { 
            font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 12px; 
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
            height: 32px; display: flex; align-items: flex-end; justify-content: center; 
            text-transform: uppercase; color: #e0f7fa; 
        }

        .svg-container { 
            position: relative; width: 100px; height: 100px; display: flex; justify-content: center; 
            align-items: center; border-radius: 50%; background: rgba(2, 6, 17, 0.85); 
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15), inset 0 0 10px rgba(0, 243, 255, 0.05); 
        }

        svg { position: absolute; width: 125%; height: 125%; transform: rotate(-90deg); overflow: visible; }

        .ring-fill { 
            fill: none; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 251.2; 
            transition: stroke-dashoffset 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke 0.4s, filter 0.4s; 
        }
        .ring-outer { fill: none; stroke: var(--cloud); stroke-width: 2; stroke-dasharray: 2 6; opacity: 0.6; }

        .percentage { 
            position: absolute; font-family: 'Share Tech Mono', monospace; font-size: 24px; 
            font-weight: 700; text-align: center; width: 100%; z-index: 10; transition: color 0.4s, text-shadow 0.4s; 
        }

        /* --- THREAT PANEL --- */
        .threat-panel {
            position: absolute; top: 30px; right: 30px; width: 280px; 
            background: rgba(5, 5, 12, 0.85); border: 1px solid; 
            z-index: 150; padding: 15px; font-family: 'Share Tech Mono', monospace;
            color: #fff; text-transform: uppercase; transition: all 0.4s ease;
        }

        .panel-secure { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 243, 255, 0.15), inset 0 0 10px rgba(0, 243, 255, 0.05); }
        .panel-danger { border-color: var(--danger); animation: threatPulse 2s infinite; }

        @keyframes threatPulse {
            0% { box-shadow: 0 0 20px rgba(255, 23, 68, 0.2), inset 0 0 15px rgba(255, 23, 68, 0.1); border-color: rgba(255, 23, 68, 0.5); }
            50% { box-shadow: 0 0 35px rgba(255, 23, 68, 0.5), inset 0 0 25px rgba(255, 23, 68, 0.3); border-color: rgba(255, 23, 68, 1.0); }
            100% { box-shadow: 0 0 20px rgba(255, 23, 68, 0.2), inset 0 0 15px rgba(255, 23, 68, 0.1); border-color: rgba(255, 23, 68, 0.5); }
        }

        .threat-header { font-size: 16px; font-weight: bold; border-bottom: 1px solid; padding-bottom: 6px; margin-bottom: 12px; letter-spacing: 2px; text-align: center; }
        .panel-secure .threat-header { color: var(--primary); border-bottom-color: rgba(0,243,255,0.4); text-shadow: 0 0 8px var(--primary); }
        .panel-danger .threat-header { color: var(--danger); border-bottom-color: var(--danger); text-shadow: 0 0 8px var(--danger); }

        .threat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .threat-label { color: #8892b0; letter-spacing: 1px; }
        .threat-value { text-align: right; font-weight: bold; transition: color 0.3s; }
        
        .threat-value.secure { color: var(--primary); text-shadow: 0 0 5px rgba(0, 243, 255, 0.5); }
        .threat-value.critical { color: var(--danger); text-shadow: 0 0 8px var(--danger); }
        .threat-value.warning { color: var(--warning); text-shadow: 0 0 8px var(--warning); }
        
        .threat-bar-container { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin: 12px 0; }
        .threat-bar { height: 100%; width: 100%; transition: width 0.1s; }

        .event-log { height: 120px; overflow-y: auto; font-size: 10px; color: #a0aabf; margin-top: 15px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); display: flex; flex-direction: column; gap: 4px; }
        .event-log::-webkit-scrollbar { width: 4px; }
        .event-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
        
        .log-entry { padding-left: 6px; border-left: 2px solid transparent; line-height: 1.3; }
        .log-entry.info { border-left-color: var(--primary); color: #00f3ff; }
        .log-entry.alert { border-left-color: var(--danger); color: #ff1744; }
        .log-entry.warn { border-left-color: var(--warning); color: #ffea00; }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }

        @media (max-width: 1500px) { #hud-container { transform: scale(0.85); transform-origin: top center; } }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="hud-container">
        <div class="arc-title">Omni Advanced System Diagnostics</div>
        <div class="gauges-arc" id="gauges-container"></div>
    </div>

    <div id="threat-panel" class="threat-panel panel-secure">
        <div id="tp-header" class="threat-header">SYSTEM SECURE</div>
        
        <div class="threat-row"><span class="threat-label">VECTOR:</span><span id="tp-type" class="threat-value secure">NONE</span></div>
        <div class="threat-row"><span class="threat-label">TARGET:</span><span id="tp-target" class="threat-value secure">N/A</span></div>
        <div class="threat-row"><span class="threat-label">SOURCE:</span><span id="tp-ip" class="threat-value secure">0.0.0.0</span></div>
        <div class="threat-row"><span class="threat-label">ORIGIN:</span><span id="tp-loc" class="threat-value secure">LOCAL</span></div>
        <div class="threat-row"><span class="threat-label">PROTO/PORT:</span><span id="tp-proto" class="threat-value secure">N/A</span></div>
        <div class="threat-row"><span class="threat-label">SEVERITY:</span><span id="tp-sev" class="threat-value secure">LOW</span></div>
        
        <div class="threat-bar-container"><div id="tp-bar" class="threat-bar" style="background: var(--primary); box-shadow: none;"></div></div>
        
        <div class="threat-row"><span class="threat-label">UPTIME:</span><span id="tp-time" class="threat-value secure">00:00:00</span></div>
        <div class="threat-row"><span id="tp-data-label" class="threat-label">DATA EXPOSED:</span><span id="tp-data" class="threat-value secure">0.00 MB</span></div>
        <div class="threat-row"><span class="threat-label">SYSTEM ADAPTATION:</span><span id="tp-adapt" class="threat-value secure">100%</span></div>
        
        <div id="event-log" class="event-log"></div>
    </div>

    <div id="vault-hud" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; font-family: 'Share Tech Mono', monospace; z-index: 1000; pointer-events: none;">
        <div style="color: #00f3ff; font-size: 14px; letter-spacing: 4px; margin-bottom: 5px;">CORE DATA VAULT</div>
        <div id="vault-val" style="color: #fff; font-size: 32px; text-shadow: 0 0 15px #00f3ff;">10000 / 10000 TB</div>
        <div id="vault-status" style="color: #00f3ff; font-size: 16px; letter-spacing: 2px; margin-top: 5px;">[ SECURE ]</div>
    </div>

    <div id="webgl-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const socket = io('http://127.0.0.1:5000');

        // --- ALL 14 LAYERS CONFIGURED ---
        const layerData = [
            { id: 'intel', name: 'THREAT INTEL', color: '#00f3ff' },
            { id: 'cloud', name: 'CLOUD SCRUB', color: '#00f3ff' },
            { id: 'cspm', name: 'CSPM MONITOR', color: '#00f3ff' },
            { id: 'waf', name: 'WEB APP FW', color: '#00f3ff' },
            { id: 'edge', name: 'EDGE NGFW', color: '#00f3ff' },
            { id: 'ztna', name: 'ZERO TRUST', color: '#00f3ff' },
            { id: 'nta', name: 'NETWORK NTA', color: '#00f3ff' }
        ];

        const reserveLayers = [
            { id: 'dlp', name: 'DATA LOSS PREV', color: '#00f3ff' },
            { id: 'heur', name: 'HEURISTIC SCAN', color: '#00f3ff' },
            { id: 'ips', name: 'IPS ENGINE', color: '#00f3ff' },
            { id: 'sand', name: 'SANDBOX EXEC', color: '#00f3ff' },
            { id: 'mseg', name: 'MICRO SEGMENT', color: '#00f3ff' },
            { id: 'ep', name: 'ENDPOINT PROT', color: '#00f3ff' },
            { id: 'qam', name: 'QUANTUM AM', color: '#00f3ff' }
        ];

        const allPotentialLayers = [...layerData, ...reserveLayers];

        const state = {
            mode: 'NORMAL',
            vault: { remaining: 10000, status: 'SECURE' }, 
            maxHealth: {}, health: {}, 
            purged: 0, soarActive: false, startTime: Date.now(), autoPilot: false, nextModeShift: 0,
            def: { 
                interceptor: false, interceptorStatus: 'ACTIVE', interceptorEnergy: 100,
                scan: false, hpActive: false, quantumActive: false, qScale: 1, empActive: false, empScale: 1 
            },
            ransomLocked: false, lastLogTime: 0, lastSoarTime: 0, serverBreached: false,
            lastActiveLayer: 'intel',
            lastQuantumTime: 0, // New timer for dynamic SOAR
            lastEmpTime: 0
        };

        allPotentialLayers.forEach(l => {
            state.maxHealth[l.id] = 200;
            state.health[l.id] = 200;
        });

        function addLog(msg, type = 'info') {
            const logContainer = document.getElementById('event-log');
            const d = new Date();
            const timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0') + '.' + Math.floor(d.getMilliseconds()/100);
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${timeStr}] ${msg}`;
            logContainer.prepend(entry);
            if(logContainer.children.length > 25) logContainer.removeChild(logContainer.lastChild);
        }

        const threatState = { active: false, startTime: 0, dataExposed: 0, rate: 0, ip: '', loc: '', proto: '', sev: '', adaptation: 1.0 };

        function generateThreatData(mode) {
            const panel = document.getElementById('threat-panel');
            const header = document.getElementById('tp-header');
            const bar = document.getElementById('tp-bar');
            const els = ['tp-type', 'tp-target', 'tp-ip', 'tp-loc', 'tp-proto', 'tp-sev', 'tp-time', 'tp-data', 'tp-adapt'];

            if (mode === 'NORMAL') {
                panel.className = 'threat-panel panel-secure';
                header.innerText = 'SYSTEM SECURE';
                threatState.active = false;
                
                document.getElementById('tp-type').innerText = 'NONE'; document.getElementById('tp-ip').innerText = '0.0.0.0';
                document.getElementById('tp-loc').innerText = 'LOCAL'; document.getElementById('tp-proto').innerText = 'N/A';
                document.getElementById('tp-sev').innerText = 'LOW'; document.getElementById('tp-time').innerText = '00:00:00';
                document.getElementById('tp-data').innerText = '0.00 MB'; document.getElementById('tp-adapt').innerText = '100%';
                
                els.forEach(id => document.getElementById(id).className = 'threat-value secure');
                bar.style.background = 'var(--primary)'; bar.style.boxShadow = 'none'; bar.style.width = '100%';
                
                addLog("System normalized. Defense matrix stable.", "info");
                return;
            }

            const geoPool = ["ST. PETERSBURG, RU", "BEIJING, CN", "PYONGYANG, KP", "TEHRAN, IR", "UNKNOWN (TOR EXIT)", "SPOOFED (AWS IP)", "SHANGHAI, CN", "MOSCOW, RU", "DARKNET NODE"];
            threatState.active = true; threatState.startTime = performance.now(); threatState.dataExposed = 0; threatState.adaptation = 1.0; 
            threatState.sev = (mode === 'APT' || mode === 'RANSOM' || mode === 'INSIDER') ? "CRITICAL" : "HIGH";

            if (mode === 'DDOS') {
                threatState.ip = "BOTNET SWARM"; threatState.loc = "GLOBAL MULTI-VECTOR"; threatState.proto = "UDP / 53 (DNS)"; threatState.rate = 150 + Math.random() * 500;
                document.getElementById('tp-data-label').innerText = "TRAFFIC VOLUME:";
            } else if (mode === 'INSIDER') {
                threatState.ip = "10.0." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + " (LAN)"; threatState.loc = "LOCAL SUBNET - SECTOR 4"; threatState.proto = "TCP / 445 (SMB)"; threatState.rate = 15 + Math.random() * 30;
                document.getElementById('tp-data-label').innerText = "DATA COMPROMISED:";
            } else {
                threatState.ip = Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ".x"; threatState.loc = geoPool[Math.floor(Math.random() * geoPool.length)];
                if (mode === 'INJECT') threatState.proto = "TCP / 443 (HTTPS)"; else if (mode === 'BRUTE') threatState.proto = "TCP / 22 (SSH)"; else if (mode === 'RANSOM') threatState.proto = "TCP / 3389 (RDP)"; else threatState.proto = "CUSTOM / ENCRYPTED";
                threatState.rate = 5 + Math.random() * 20; 
                document.getElementById('tp-data-label').innerText = (mode === 'RANSOM') ? "FILES ENCRYPTED:" : "PAYLOAD SIZE:";
            }

            document.getElementById('tp-type').innerText = mode + " ATTACK"; document.getElementById('tp-ip').innerText = threatState.ip;
            document.getElementById('tp-loc').innerText = threatState.loc; document.getElementById('tp-proto').innerText = threatState.proto;
            document.getElementById('tp-sev').innerText = threatState.sev;
            
            panel.className = 'threat-panel panel-danger'; header.innerText = '⚠️ THREAT DETECTED ⚠️';
            bar.style.background = 'var(--danger)'; bar.style.boxShadow = '0 0 10px var(--danger)';
            
            els.forEach(id => {
                if(id !== 'tp-target') {
                    let el = document.getElementById(id);
                    el.className = (id === 'tp-sev' && threatState.sev === "CRITICAL") ? 'threat-value critical' : 'threat-value warning';
                }
            });
            document.getElementById('tp-type').className = 'threat-value critical'; document.getElementById('tp-data').className = 'threat-value critical';
            document.getElementById('tp-target').className = 'threat-value warning'; document.getElementById('tp-adapt').className = 'threat-value critical'; 
            
            addLog(`WARNING: ${mode} vector detected from ${threatState.ip}`, 'alert');
        }

        const modes = ['DDOS', 'BRUTE', 'INJECT', 'APT', 'INSIDER', 'EXFIL', 'RANSOM'];
        let triggerShakeFlag = false;

        const arcContainer = document.getElementById('gauges-container');
        allPotentialLayers.forEach(mod => {
            const wrapper = document.createElement('div');
            wrapper.className = 'gauge-wrapper';
            wrapper.id = 'wrapper-' + mod.id; 
            
            wrapper.style.opacity = '0';
            wrapper.style.visibility = 'hidden';
            wrapper.style.transform = `rotate(0deg) translateY(-580px) rotate(0deg)`;
            
            wrapper.innerHTML = `
                <div class="gauge-label">${mod.name.replace(' ', '<br>')}</div>
                <div class="svg-container">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle>
                        <circle id="svg-${mod.id}" class="ring-fill" cx="50" cy="50" r="40" stroke="#00f3ff"></circle>
                        <circle class="ring-outer" cx="50" cy="50" r="48"></circle>
                    </svg>
                    <div id="txt-${mod.id}" class="percentage">100%</div>
                </div>
            `;
            arcContainer.appendChild(wrapper);
        });

        function setMode(newMode) {
            const previousMode = state.mode;
            state.mode = newMode;
            
            traffic.system.visible = (state.mode === 'NORMAL' || state.mode === 'DDOS'); 
            brute.system.visible = (state.mode === 'BRUTE'); 
            apt.system.visible = (state.mode === 'APT'); 
            exfil.system.visible = (state.mode === 'EXFIL'); 
            ransomParticles.system.visible = (state.mode === 'RANSOM');
            
            injectionViruses.forEach(v => { 
                v.visible = (state.mode === 'INJECT'); 
                if(state.mode === 'INJECT') v.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, -60); 
            });
            
            if(state.mode === 'NORMAL') traffic.system.material.color.setHex(0x00e5ff); 
            if(state.mode === 'DDOS') traffic.system.material.color.setHex(0xff1744);

            nodesGroup.children.forEach(c => { 
                if(c.type === "Mesh") { 
                    c.material.color.setHex(0xff3300); 
                    c.material.emissive.setHex(0xff6600); 
                    c.userData.isRogue = false; 
                }
            });
            
            if(state.mode === 'INSIDER') {
                const rogueNode = nodesGroup.children[Math.floor(Math.random() * 6)]; 
                if(rogueNode && rogueNode.type === "Mesh") { rogueNode.material.color.setHex(0xff1744); rogueNode.material.emissive.setHex(0xff1744); rogueNode.userData.isRogue = true; }
            }
            if(state.mode !== 'RANSOM' && state.ransomLocked) { state.ransomLocked = false; }

            // --- SOAR AUTOMATED RESPONSE (Initial Triggers) ---
            if (previousMode === 'NORMAL' && newMode !== 'NORMAL') {
                addLog("SOAR: Threat detected. Initiating automated countermeasures.", "warn");

                // Note: Quantum Armor is now held back and deployed dynamically based on health!
                
                if(!state.def.scan) {
                    state.def.scan = true; 
                    scanGrid.visible = true;
                    addLog("SOAR: Heuristic Deep Scan engaged.", "info");
                }

                if(!state.def.interceptor) {
                    state.def.interceptor = true;
                    state.def.interceptorEnergy = 100;
                    state.def.interceptorStatus = 'ACTIVE';
                    addLog("SOAR: Interceptor satellites deployed.", "info");
                }
            } else if (newMode === 'NORMAL') {
                state.def.scan = false;
                scanGrid.visible = false;
                state.def.interceptor = false;
            }

            generateThreatData(state.mode);
        }

        socket.on('omni_sync', (data) => {
            if (data.cmd === 'zoom') { camera.position.setLength(data.val); controls.update(); } 
            else if (data.cmd === 'setMode') { if(state.autoPilot) { state.autoPilot = false; } setMode(data.val); } 
            else if (data.cmd === 'setAutoPilot') { state.autoPilot = data.val; if(state.autoPilot) state.nextModeShift = performance.now() + 5000; } 
            else if (data.cmd === 'setSoar') { state.soarActive = data.val; } 
            else if (data.cmd === 'btnClick') {
                switch(data.id) {
                    case 'btnInterceptor': state.def.interceptor = !state.def.interceptor; break;
                    case 'btnDeepScan': state.def.scan = !state.def.scan; scanGrid.visible = state.def.scan; break;
                    case 'btnHoneypot': if(!state.def.hpActive) { state.def.hpActive = true; honeypotGroup.visible = true; setTimeout(() => { state.def.hpActive = false; honeypotGroup.visible = false; }, 8000); } break;
                    case 'btnSignatures': setTimeout(() => { if(state.mode === 'INJECT' || state.mode === 'RANSOM') state.purged++; }, 1500); break;
                    case 'btnBlackhole': for(let i=0; i<traffic.count*3; i+=3) { traffic.positions[i] *= 3; traffic.positions[i+1] *= 3; traffic.positions[i+2] *= 3; } traffic.system.geometry.attributes.position.needsUpdate = true; break;
                    case 'btnQuantum': if(!state.def.quantumActive) { state.def.quantumActive = true; shockwaveGroup.visible = true; state.def.qScale = 1; Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); setTimeout(() => { state.def.quantumActive = false; }, 4000); } break;
                    case 'btnEMP': if(!state.def.empActive) { state.def.empActive = true; empSphere.visible = true; state.def.empScale = 0.1; [traffic, brute, apt, exfil, ransomParticles].forEach(sys => { for(let i=0; i<sys.count*3; i+=3) { spawnOuter(sys.positions, i, 220, 320); } sys.system.geometry.attributes.position.needsUpdate = true; }); if(state.mode === 'RANSOM') { setMode('NORMAL'); if(state.autoPilot) state.nextModeShift = performance.now() + 5000;} } break;
                    case 'btnRepair': Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); state.serverBreached = false; state.startTime = Date.now(); state.vault.remaining = 10000; state.vault.status = 'SECURE'; if(state.ransomLocked) setMode('NORMAL'); break;
                }
            } else if (data.cmd === 'vigourSuccess') {
                Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); state.purged += 5; 
                serverMesh.material.emissive.setHex(0x00e5ff); setTimeout(() => serverMesh.material.emissive.setHex(0x0011aa), 1000);
                if(state.ransomLocked) { state.ransomLocked = false; } setMode('NORMAL'); if(state.autoPilot) state.nextModeShift = performance.now() + 5000;
            }
        });

        // ==========================================
        //         SCENE SETUP & LIGHTING
        // ==========================================
        const scene = new THREE.Scene();

                                if (distSq > 400 && distSq < 90000) { found = true; }
                            }

                            let laser = interceptorLasers[nodeIdx]; let flare = interceptorFlares[nodeIdx];
                            
                            if (found) {
                                laser.visible = true; flare.visible = true; 
                                let nodeWorld = new THREE.Vector3(); child.getWorldPosition(nodeWorld);
                                let posArr = laser.geometry.attributes.position.array; 
                                posArr[0] = nodeWorld.x; posArr[1] = nodeWorld.y; posArr[2] = nodeWorld.z; 
                                posArr[3] = px; posArr[4] = py; posArr[5] = pz; 
                                laser.geometry.attributes.position.needsUpdate = true;
                                
                                flare.position.set(px, py, pz); flare.scale.setScalar(1 + Math.random() * 1.5);
                                
                                targetSys.positions[pIdx] = 999999;
                                targetSys.positions[pIdx+1] = 999999;
                                targetSys.positions[pIdx+2] = 999999;
                                
                                state.purged++;
                            } else { 
                                laser.visible = false; flare.visible = false; 
                            }
                            nodeIdx++;
                        }
                    });
                } else {
                    interceptorLasers.forEach(l => l.visible = false); interceptorFlares.forEach(f => f.visible = false); 
                }
            } else { 
                interceptorLasers.forEach(l => l.visible = false); interceptorFlares.forEach(f => f.visible = false); 
            }

            if (state.mode === 'NORMAL' || state.mode === 'DDOS') {
                let limit = state.mode === 'NORMAL' ? 800 : traffic.count; let speed = state.mode === 'NORMAL' ? 0.35 : 1.0; let dmg = 0;
                for(let i=0; i<limit; i++) {
                    let idx = i*3; let x = traffic.positions[idx], y = traffic.positions[idx+1], z = traffic.positions[idx+2]; let distSq = (x*x + y*y + z*z);
                    if (distSq > 0) { let dist = Math.sqrt(distSq); traffic.positions[idx] -= (x/dist)*speed; traffic.positions[idx+1] -= (y/dist)*speed; traffic.positions[idx+2] -= (z/dist)*speed; }
                    if (distSq <= activeTargetRadiusSq) { spawnOuter(traffic.positions, idx); if (state.mode === 'DDOS' && !isImmune) dmg++; }
                }
                if (state.mode === 'DDOS' && !isImmune) { 
                    if (activeLayerName !== 'server') { 
                        state.health[activeLayerName] -= (dmg * 0.05 * dmgMult); 
                        if(Math.random()>0.8) triggerShakeFlag=true; 
                    } else { 
                        if(dmg > 0) { state.serverBreached = true; state.vault.remaining -= 20; }
                    } 
                }
                traffic.system.geometry.attributes.position.needsUpdate = true;
            }

            if (state.mode === 'BRUTE') {
                let hit = false; let sourceX = 180, sourceY = 60, sourceZ = 140;
                for(let i=0; i<brute.count; i++) {
                    let idx = i*3; let x = brute.positions[idx]; let y = brute.positions[idx+1]; let z = brute.positions[idx+2]; let dist = Math.sqrt(x*x + y*y + z*z);
                    if (dist > activeTargetRadius && dist > 5) { let speed = 0.8 + Math.random() * 2.0; brute.positions[idx] -= (x/dist) * speed + (Math.random()-0.5)*1.5; brute.positions[idx+1] -= (y/dist) * speed + (Math.random()-0.5)*1.5; brute.positions[idx+2] -= (z/dist) * speed + (Math.random()-0.5)*1.5; } else { brute.positions[idx] = sourceX + (Math.random()-0.5)*40; brute.positions[idx+1] = sourceY + (Math.random()-0.5)*40; brute.positions[idx+2] = sourceZ + (Math.random()-0.5)*40; hit = true; if (!isImmune) { if (activeLayerName !== 'server') { state.health[activeLayerName] -= (0.15 * dmgMult); } else { state.serverBreached = true; state.vault.remaining -= 20; } } }
                }
                if(hit && Math.random() > 0.8) triggerShakeFlag=true; brute.system.geometry.attributes.position.needsUpdate = true;
            }

            if (state.mode === 'INJECT') {
                let tX = state.def.hpActive ? honeypotGroup.position.x : 0, tY = state.def.hpActive ? honeypotGroup.position.y : 0, tZ = state.def.hpActive ? honeypotGroup.position.z : 0;
                injectionViruses.forEach(v => {
                    v.rotation.x += 0.1; v.rotation.y += 0.1; let dx = tX - v.position.x, dy = tY - v.position.y, dz = tZ - v.position.z; let distToTarget = Math.sqrt(dx*dx + dy*dy + dz*dz); let speed = state.def.scan ? 0.08 : 0.35; 
                    if (distToTarget > 0.5) { v.position.x += (dx/distToTarget)*speed; v.position.y += (dy/distToTarget)*speed; v.position.z += (dz/distToTarget)*speed; }
                    if (!state.def.hpActive) { 
                        let hitRadius = state.def.scan ? activeTargetRadius : (layerMeshes['ips'] ? layerMeshes['ips'].userData.currentRadius : 40); 
                        let targetLayer = state.def.scan ? activeLayerName : 'ips';
                        if (distToTarget < hitRadius || (state.health.waf > 0 && distToTarget < (layerMeshes['waf'] ? layerMeshes['waf'].userData.currentRadius : 80))) { 
                            if (!isImmune) { 
                                if(state.health.waf > 0) { state.health.waf -= 2.0; } 
                                else if (targetLayer !== 'server' && state.health[targetLayer] > 0) { state.health[targetLayer] -= 2.0; triggerShakeFlag=true; } 
                                else { state.serverBreached = true; state.vault.remaining -= 20;} 
                            } 
                            v.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, -60); 
                        }
                    } else if (distToTarget < 3) { v.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, -60); } 
                });
            }

            if (state.mode === 'APT') {
                let tX = state.def.hpActive ? honeypotGroup.position.x : 0, tY = state.def.hpActive ? honeypotGroup.position.y : 0, tZ = state.def.hpActive ? honeypotGroup.position.z : 0; let speed = state.def.scan ? 0.08 : 0.25;
                for(let i=0; i<apt.count; i++) {
                    let idx = i*3; let dx = tX - apt.positions[idx], dy = tY - apt.positions[idx+1], dz = tZ - apt.positions[idx+2]; let dist = Math.sqrt(dx*dx + dy*dy + dz*dz); let trgR = state.def.hpActive ? 5.5 : activeTargetRadius + 0.5;
                    if (dist > trgR) { apt.positions[idx] += (dx/dist)*speed; apt.positions[idx+1] += (dy/dist)*speed; apt.positions[idx+2] += (dz/dist)*speed; } else { apt.positions[idx] += (Math.random()-0.5)*0.3; apt.positions[idx+1] += (Math.random()-0.5)*0.3; apt.positions[idx+2] += (Math.random()-0.5)*0.3; if (!state.def.hpActive && !isImmune) { if (activeLayerName !== 'server') state.health[activeLayerName] -= 0.05; else { state.serverBreached = true; state.vault.remaining -= 20; } } }
                }
                apt.system.geometry.attributes.position.needsUpdate = true;
            }

            if (state.mode === 'INSIDER') {
                let rogueNode = null; nodesGroup.children.forEach(c => { if(c.userData.isRogue) rogueNode = c; });
                if(rogueNode) {
                    let nodeWorld = new THREE.Vector3(); rogueNode.getWorldPosition(nodeWorld); insiderLaser.visible = true; insiderLaser.material.opacity = 0.5 + Math.sin(now * 0.02) * 0.5;
                    let posArr = insiderLaser.geometry.attributes.position.array; posArr[0] = nodeWorld.x; posArr[1] = nodeWorld.y; posArr[2] = nodeWorld.z;
                    let hitPoint = nodeWorld.clone().normalize().multiplyScalar(activeTargetRadius); posArr[3] = hitPoint.x; posArr[4] = hitPoint.y; posArr[5] = hitPoint.z; insiderLaser.geometry.attributes.position.needsUpdate = true;
                    if (!isImmune) { if (activeLayerName !== 'server') { state.health[activeLayerName] -= 0.3; triggerShakeFlag=true; } else { state.serverBreached = true; state.vault.remaining -= 20; } }
                } else { insiderLaser.visible = false; }
            } else { insiderLaser.visible = false; }

            if (state.mode === 'EXFIL') {
                for(let i=0; i<exfil.count; i++) {
                    let idx = i*3; let x = exfil.positions[idx], y = exfil.positions[idx+1], z = exfil.positions[idx+2]; let dist = Math.sqrt(x*x + y*y + z*z);
                    exfil.positions[idx] += (x/dist)*0.4; exfil.positions[idx+1] += (y/dist)*0.4; exfil.positions[idx+2] += (z/dist)*0.4;
                    if (dist > 180) { spawnInner(exfil.positions, idx); if(!isImmune && activeLayerName !== 'server') { state.health[activeLayerName] -= 0.3; } else if (!isImmune) { state.serverBreached = true; if(state.vault.remaining > 0) { state.vault.remaining -= 1.5; state.vault.status = 'CRITICAL: EXFILTRATION IN PROGRESS'; } } }
                }
                exfil.system.geometry.attributes.position.needsUpdate = true;
            }

            if (state.mode === 'RANSOM') {
                for(let i=0; i<ransomParticles.count; i++) {
                    let idx = i*3; let x = ransomParticles.positions[idx], y = ransomParticles.positions[idx+1], z = ransomParticles.positions[idx+2]; let distSq = (x*x + y*y + z*z);
                    if (distSq > activeTargetRadiusSq) { let dist = Math.sqrt(distSq); ransomParticles.positions[idx] -= (x/dist)*0.45; ransomParticles.positions[idx+1] -= (y/dist)*0.45; ransomParticles.positions[idx+2] -= (z/dist)*0.45; } else { ransomParticles.positions[idx] += (Math.random()-0.5)*1.5; ransomParticles.positions[idx+1] += (Math.random()-0.5)*1.5; ransomParticles.positions[idx+2] += (Math.random()-0.5)*1.5; if (!isImmune) { if (activeLayerName !== 'server') { state.health[activeLayerName] -= (0.2 * dmgMult); if(Math.random()>0.9) triggerShakeFlag=true; } else { state.serverBreached = true; state.vault.status = 'LOCKED: RANSOMWARE ENCRYPTION'; state.vault.remaining -= 20; } } }
                }
                ransomParticles.system.geometry.attributes.position.needsUpdate = true;
            }

            if (state.serverBreached) { 
                serverMesh.material.color.setHex(0xff1744); 
                serverMesh.material.emissive.setHex(0x440011); 
            } else { 
                serverMesh.material.color.setHex(0x000033); 
                serverMesh.material.emissive.setHex(0x0033ff); 
            }

            const vVal = document.getElementById('vault-val'); 
            const vStat = document.getElementById('vault-status');
            
            if (state.serverBreached === false && state.vault.remaining >= 10000) {
                state.vault.status = 'SECURE';
            }
            
            if(vVal && vStat) {
                if (state.serverBreached || state.vault.remaining < 10000) {
                    vStat.innerText = state.vault.status === 'SECURE' ? "[ CRITICAL: BREACH DETECTED ]" : "[ " + state.vault.status + " ]";
                    vVal.innerText = Math.max(0, Math.floor(state.vault.remaining)) + " / 10000 TB"; 
                    vVal.style.color = '#ff1744'; vVal.style.textShadow = '0 0 15px #ff1744'; vStat.style.color = '#ff1744'; 
                } else {
                    vStat.innerText = "[ SECURE ]";
                    vVal.innerText = "10000 / 10000 TB"; 
                    vVal.style.color = '#fff'; vVal.style.textShadow = '0 0 15px #00f3ff'; vStat.style.color = '#00f3ff'; 
                }
            }

            if (now - state.lastLogTime > 100) { 
                socket.emit('omni_sync', { cmd: 'syncVault', remaining: state.vault.remaining, status: state.vault.status }); 
                state.lastLogTime = now; 
            }

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
