<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omni-Stack Visualizer: TRUE HOLOGRAPHIC GRID</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --cloud: #00f3ff; --waf: #00d4ff; --edge: #00b2ff; --nta: #0090ff; --ips: #006eff;
            --sandbox: #004cff; --dlp: #002aff; --ztna: #0008ff; --core: #0000cc;
            --primary: #00e5ffd1; --danger: #ff1744; --warning: #ffea00;
            --cyan-glow: rgba(0, 243, 255, 0.6);
            --bg-dark: #02040a;
        }

        /* --- DYNAMIC UNIVERSE ANIMATIONS --- */
        @keyframes nebulaPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes starScrollSlow {
            from { background-position: 0 0; }
            to { background-position: 0 -1000px; }
        }

        @keyframes starScrollFast {
            from { background-position: 0 0; }
            to { background-position: 0 -800px; }
        }

        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        body { 
            overflow: hidden; 
            
            /* DYNAMIC DEEP SPACE NEBULA */
            background: linear-gradient(-45deg, #010314, #080521, #02112b, #110526) !important;
            background-size: 400% 400% !important;
            animation: nebulaPulse 18s ease infinite !important;
            
            cursor: crosshair; 
            font-family: 'Rajdhani', sans-serif;
            color: var(--primary);
            user-select: none;
        }

        /* LAYER 1: DISTANT STARS (Ultra-Dense, Small, Slow) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            
            /* Added golden stars and doubled the density */
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
                radial-gradient(1px 1px at 90px 80px, #aee2ff, transparent),
                radial-gradient(1.5px 1.5px at 150px 180px, #ffffff, transparent),
                radial-gradient(1px 1px at 220px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 280px 140px, #c4a1ff, transparent),
                radial-gradient(1.5px 1.5px at 50px 220px, #ffffff, transparent),
                radial-gradient(1px 1px at 320px 280px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1.2px 1.2px at 180px 100px, #ffd700, transparent), /* Gold */
                radial-gradient(1.5px 1.5px at 250px 250px, #ffffff, transparent),
                radial-gradient(1px 1px at 60px 150px, rgba(255, 215, 0, 0.6), transparent), /* Faint Gold */
                radial-gradient(1px 1px at 300px 70px, #ffffff, transparent),
                radial-gradient(1px 1px at 110px 310px, #aee2ff, transparent);
            background-size: 350px 350px; 
            
            z-index: 0; 
            pointer-events: none;
            animation: starScrollSlow 60s linear infinite;
        }

        /* LAYER 2: FOREGROUND STARS (Sparse, Brighter, Fast, Golden) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            
            /* Added larger, bright yellow/gold stars for parallax depth */
            background-image: 
                radial-gradient(2px 2px at 40px 70px, #ffffff, transparent),
                radial-gradient(2.5px 2.5px at 150px 120px, #80deea, transparent),
                radial-gradient(2px 2px at 280px 60px, #ffffff, transparent),
                radial-gradient(3px 3px at 350px 200px, #e1bee7, transparent),
                radial-gradient(2px 2px at 90px 280px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2.5px 2.5px at 220px 330px, #ffffff, transparent),
                radial-gradient(3px 3px at 120px 40px, #ffdf00, transparent), /* Bright Gold */
                radial-gradient(2px 2px at 300px 150px, #ffffff, transparent),
                radial-gradient(2.5px 2.5px at 50px 200px, rgba(255, 223, 0, 0.8), transparent), /* Soft Gold */
                radial-gradient(3.5px 3.5px at 250px 250px, #ffffff, transparent),
                radial-gradient(2.5px 2.5px at 380px 380px, #ffdf00, transparent); /* Bright Gold */
            background-size: 400px 400px; 
            
            z-index: 0; 
            pointer-events: none;
            animation: starScrollFast 35s linear infinite;
        }
        
        .scanlines { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); 
            background-size: 100% 4px; pointer-events: none; z-index: 90;
        }
        
        #hud-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }
        .arc-title { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 24px; font-weight: 700; letter-spacing: 5px; text-shadow: 0 0 15px var(--cyan-glow); border-top: 2px solid var(--primary); border-radius: 50% 50% 0 0 / 100% 100% 0 0; padding: 12px 180px 0 180px; color: #d0fbff; text-transform: uppercase; white-space: nowrap; }
        .gauges-arc { position: absolute; top: 750px; left: 50%; width: 0; height: 0; z-index: 100; }
        .gauge-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; width: 140px; top: 0; left: 0; margin-top: -65px; margin-left: -70px; }
        .gauge-wrapper:nth-child(1) { transform: rotate(-64deg) translateY(-580px) rotate(64deg); }
        .gauge-wrapper:nth-child(2) { transform: rotate(-48deg) translateY(-580px) rotate(48deg); }
        .gauge-wrapper:nth-child(3) { transform: rotate(-32deg) translateY(-580px) rotate(32deg); }
        .gauge-wrapper:nth-child(4) { transform: rotate(-16deg) translateY(-580px) rotate(16deg); }
        .gauge-wrapper:nth-child(5) { transform: rotate(0deg) translateY(-580px) rotate(0deg); }
        .gauge-wrapper:nth-child(6) { transform: rotate(16deg) translateY(-580px) rotate(-16deg); }
        .gauge-wrapper:nth-child(7) { transform: rotate(32deg) translateY(-580px) rotate(-32deg); }
        .gauge-wrapper:nth-child(8) { transform: rotate(48deg) translateY(-580px) rotate(-48deg); }
        .gauge-wrapper:nth-child(9) { transform: rotate(64deg) translateY(-580px) rotate(-64deg); }
        .gauge-label { font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 12px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); height: 32px; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; color: #e0f7fa; }
        .svg-container { position: relative; width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: rgba(2, 6, 17, 0.85); box-shadow: 0 0 15px rgba(0, 243, 255, 0.15), inset 0 0 10px rgba(0, 243, 255, 0.05); }
        svg { position: absolute; width: 125%; height: 125%; transform: rotate(-90deg); overflow: visible; }
        .ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 251.2; transition: stroke-dashoffset 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke 0.4s, filter 0.4s; }
        .ring-outer { fill: none; stroke: var(--cloud); stroke-width: 2; stroke-dasharray: 2 6; opacity: 0.6; }
        .percentage { position: absolute; font-family: 'Share Tech Mono', monospace; font-size: 24px; font-weight: 700; text-align: center; width: 100%; z-index: 10; transition: color 0.4s, text-shadow 0.4s; }

        @media (max-width: 1500px) { #hud-container { transform: scale(0.85); transform-origin: top center; } }
        @media (max-width: 1200px) { #hud-container { transform: scale(0.65); transform-origin: top center; } }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="hud-container">
        <div class="arc-title">Omni Advanced System Diagnostics</div>
        
        <div class="gauges-arc">
            <div class="gauge-wrapper"><div class="gauge-label">1. Cloud<br>Scrub</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgCloud" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtCloud" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">2. Web<br>App FW</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgWaf" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtWaf" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">3. Edge<br>NGFW</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgEdge" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtEdge" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">4. Network<br>NTA</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgNta" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtNta" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">5. IPS<br>Engine</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgIps" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtIps" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">6. AV<br>Sandbox</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgSandbox" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtSandbox" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">7. DLP<br>Gateway</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgDlp" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtDlp" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">8. ZTNA<br>Access</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgZtna" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtZtna" class="percentage">100%</div></div></div>
            <div class="gauge-wrapper"><div class="gauge-label">9. Core<br>Auth</div><div class="svg-container"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="transparent" stroke="rgba(0, 243, 255, 0.15)" stroke-width="2"></circle><circle id="svgCore" class="ring-fill" cx="50" cy="50" r="40"></circle><circle class="ring-outer" cx="50" cy="50" r="48"></circle></svg><div id="txtCore" class="percentage">100%</div></div></div>
        </div>
    </div>

    <div id="vault-hud" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; font-family: 'Share Tech Mono', monospace; z-index: 100; pointer-events: none;">
        <div style="color: #00f3ff; font-size: 14px; letter-spacing: 4px; margin-bottom: 5px;">CORE DATA VAULT</div>
        <div id="vault-val" style="color: #fff; font-size: 32px; text-shadow: 0 0 15px #00f3ff;">10000 / 10000 TB</div>
        <div id="vault-status" style="color: #00f3ff; font-size: 16px; letter-spacing: 2px; margin-top: 5px;">[ SECURE ]</div>
    </div>

    <div id="webgl-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- WEB SOCKET SETUP ---
        // This line replaces BroadcastChannel and listens to your Python server!
        const socket = io('http://127.0.0.1:5000');

        class TelemetryEngine { getLayer(id) { return { health: state.health[id] }; } }
        const engine = new TelemetryEngine();

        const state = {
            mode: 'NORMAL',
            vault: { remaining: 10000, status: 'SECURE' }, 
            maxHealth: { cloud: 100, waf: 100, edge: 100, nta: 100, ips: 100, sandbox: 100, dlp: 100, ztna: 100, core: 100 },
            health: { cloud: 100, waf: 100, edge: 100, nta: 100, ips: 100, sandbox: 100, dlp: 100, ztna: 100, core: 100 },
            serverBreached: false,
            radius: { cloud: 120, waf: 105, edge: 90, nta: 75, ips: 60, sandbox: 45, dlp: 30, ztna: 20, core: 10, server: 6 },
            radiusSq: { cloud: 14400, waf: 11025, edge: 8100, nta: 5625, ips: 3600, sandbox: 2025, dlp: 900, ztna: 400, core: 100, server: 36 },
            purged: 0, soarActive: false, startTime: Date.now(), autoPilot: false, nextModeShift: 0,
            def: { interceptor: false, scan: false, hpActive: false, quantumActive: false, qScale: 1, empActive: false, empScale: 1 },
            ransomLocked: false, lastLogTime: 0, lastSoarTime: 0
        };

        const modes = ['DDOS', 'BRUTE', 'INJECT', 'APT', 'INSIDER', 'EXFIL', 'RANSOM'];
        let triggerShakeFlag = false;

        function setMode(newMode) {
            state.mode = newMode;
            traffic.system.visible = (state.mode === 'NORMAL' || state.mode === 'DDOS'); 
            brute.system.visible = (state.mode === 'BRUTE'); 
            apt.system.visible = (state.mode === 'APT'); 
            exfil.system.visible = (state.mode === 'EXFIL'); 
            ransomParticles.system.visible = (state.mode === 'RANSOM');
            
            injectionViruses.forEach(v => { v.visible = (state.mode === 'INJECT'); if(state.mode==='INJECT') v.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, -60); });
            if(state.mode === 'NORMAL') traffic.system.material.color.setHex(0x00e5ff); if(state.mode === 'DDOS') traffic.system.material.color.setHex(0xff1744);

            nodesGroup.children.forEach(c => { if(c.type === "Mesh") { c.material.color.setHex(0x00e5ff); c.material.emissive.setHex(0x0088ff); c.userData.isRogue = false; }});
            if(state.mode === 'INSIDER') {
                const rogueNode = nodesGroup.children[Math.floor(Math.random() * 6)]; 
                if(rogueNode && rogueNode.type === "Mesh") { rogueNode.material.color.setHex(0xff1744); rogueNode.material.emissive.setHex(0xff1744); rogueNode.userData.isRogue = true; }
            }
            if(state.mode !== 'RANSOM' && state.ransomLocked) { state.ransomLocked = false; }
        }

        // Listens to the Python backend instead of the local browser
        socket.on('omni_sync', (data) => {
            if (data.cmd === 'zoom') { camera.position.setLength(data.val); controls.update(); } 
            else if (data.cmd === 'setMode') { if(state.autoPilot) { state.autoPilot = false; } setMode(data.val); } 
            else if (data.cmd === 'setAutoPilot') { state.autoPilot = data.val; if(state.autoPilot) state.nextModeShift = performance.now() + 5000; } 
            else if (data.cmd === 'setSoar') { state.soarActive = data.val; } 
            else if (data.cmd === 'btnClick') {
                switch(data.id) {
                    case 'btnInterceptor': state.def.interceptor = !state.def.interceptor; break;
                    case 'btnDeepScan': state.def.scan = !state.def.scan; scanGrid.visible = state.def.scan; break;
                    case 'btnHoneypot': if(!state.def.hpActive) { state.def.hpActive = true; honeypotGroup.visible = true; setTimeout(() => { state.def.hpActive = false; honeypotGroup.visible = false; }, 8000); } break;
                    case 'btnSignatures': setTimeout(()=> { if(state.mode === 'INJECT' || state.mode === 'RANSOM') state.purged++; }, 1500); break;
                    case 'btnBlackhole': for(let i=0; i<traffic.count*3; i+=3) { traffic.positions[i]*=3; traffic.positions[i+1]*=3; traffic.positions[i+2]*=3; } traffic.system.geometry.attributes.position.needsUpdate = true; break;
                    case 'btnQuantum': if(!state.def.quantumActive) { state.def.quantumActive = true; shockwaveGroup.visible = true; state.def.qScale = 1; Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); setTimeout(() => { state.def.quantumActive = false; }, 4000); } break;
                    case 'btnEMP': if(!state.def.empActive) { state.def.empActive = true; empSphere.visible = true; state.def.empScale = 0.1; [traffic, brute, apt, exfil, ransomParticles].forEach(sys => { for(let i=0; i<sys.count*3; i+=3) { spawnOuter(sys.positions, i, 200, 300); } sys.system.geometry.attributes.position.needsUpdate = true; }); if(state.mode === 'RANSOM') { setMode('NORMAL'); if(state.autoPilot) state.nextModeShift = performance.now() + 5000;} } break;
                    case 'btnRepair': 
                        Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); 
                        state.serverBreached = false; 
                        state.startTime = Date.now(); 
                        state.vault.remaining = 10000;
                        state.vault.status = 'SECURE';
                        if(state.ransomLocked) setMode('NORMAL'); 
                        break;
                }
            } else if (data.cmd === 'vigourSuccess') {
                Object.keys(state.health).forEach(k => state.health[k] = state.maxHealth[k]); state.purged += 5; 
                serverMesh.material.emissive.setHex(0x00e5ff); setTimeout(()=> serverMesh.material.emissive.setHex(0x0011aa), 1000);
                if(state.ransomLocked) { state.ransomLocked = false; } setMode('NORMAL'); if(state.autoPilot) state.nextModeShift = performance.now() + 5000;
            }
        });

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x02040a, 0.002); 

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 30, 550); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.maxDistance = 800; 
        controls.minDistance = 10;
        controls.autoRotate = false;
        controls.target.set(0, 40, 0); 
        controls.update(); 

        scene.add(new THREE.AmbientLight(0x222233));
        const coreLight = new THREE.PointLight(0x00aaff, 2.5, 150); coreLight.position.set(0,0,0); scene.add(coreLight);
        const blueLight = new THREE.PointLight(0x00e5ff, 1.5, 200); blueLight.position.set(50, 50, 50); scene.add(blueLight);

        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();

        // --- AMBIENT DATA DUST ---
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 2000;
        const dustPos = new Float32Array(dustCount * 3);
        for(let i = 0; i < dustCount * 3; i++) {
            dustPos[i] = (Math.random() - 0.5) * 1200; 
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));

        const dustMat = new THREE.PointsMaterial({
            color: 0x00b2ff,
            size: 1.2,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const backgroundDust = new THREE.Points(dustGeo, dustMat);
        scene.add(backgroundDust);

        // --- GLOWING HOLOGRAPHIC SHADER ---
        function createGlowMat(colorHex, baseOpacity) {
            const matColor = new THREE.Color(colorHex);
            const mat = new THREE.ShaderMaterial({
                uniforms: { color: { value: matColor }, uOpacity: { value: baseOpacity * 2.5 } },
                vertexShader: `
                    varying vec3 vNormal; varying vec3 vPositionNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPositionNormal = normalize((modelViewMatrix * vec4(position, 1.0)).xyz);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 color; uniform float uOpacity;
                    varying vec3 vNormal; varying vec3 vPositionNormal;
                    void main() {
                        float fresnel = dot(vNormal, -vPositionNormal);
                        fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                        fresnel = pow(fresnel, 2.5); 
                        float alpha = (0.01 + fresnel * 2.0) * uOpacity;
                        vec3 finalColor = color * (1.0 + fresnel * 3.0); 
                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.FrontSide, wireframe: true
            });
            mat.color = matColor; mat.emissive = new THREE.Color(colorHex); 
            Object.defineProperty(mat, 'opacity', { get: function() { return this.uniforms.uOpacity.value; }, set: function(v) { this.uniforms.uOpacity.value = v; }});
            return mat;
        }

        // --- MESH OBJECTS ---
        const globe = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshBasicMaterial({color: 0x00aaff, wireframe: true, transparent: true, opacity: 0.8})); scene.add(globe);
        const serverMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(4.5, 0), new THREE.MeshPhongMaterial({color: 0x0000cc, emissive: 0x0011aa, flatShading: true, emissiveIntensity: 1.5})); scene.add(serverMesh);
        const honeypotGroup = new THREE.Group(); honeypotGroup.visible = false; scene.add(honeypotGroup);
        const scanGrid = new THREE.Mesh(new THREE.SphereGeometry(85, 64, 64), new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.0, wireframe: true, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending })); scanGrid.visible = false; scene.add(scanGrid);
        
        const shockwaveGroup = new THREE.Group(); shockwaveGroup.visible = false;
        const swOuter = new THREE.Mesh(new THREE.RingGeometry(0.9, 1, 64), new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, side: THREE.DoubleSide}));

                    if (pct < 40 && !state.def.quantumActive) { 
                        mesh.material.color.setHex(Math.random() > 0.7 ? 0xff1744 : hexColor); mesh.material.emissive.setHex(Math.random() > 0.7 ? 0xff1744 : hexColor);
                        update.barColor = 'var(--danger)';
                    } else { 
                        mesh.material.color.setHex(hexColor); mesh.material.emissive.setHex(hexColor);
                        update.barColor = defColor; 
                    }
                } else { 
                    mesh.visible = false; update.pctText = "OFFLINE"; update.pctWidth = 0; update.barColor = 'rgba(255,0,0,0.5)'; 
                }
                return update;
            };

            const uiUpdates = [
                getLayerUpdate(cloudMesh, 'cloud', 'var(--cloud)', 0x00f3ff), getLayerUpdate(wafMesh, 'waf', 'var(--cloud)', 0x00d4ff),
                getLayerUpdate(edgeMesh, 'edge', 'var(--cloud)', 0x00b2ff), getLayerUpdate(ntaMesh, 'nta', 'var(--cloud)', 0x0090ff),
                getLayerUpdate(ipsMesh, 'ips', 'var(--cloud)', 0x006eff), getLayerUpdate(sandboxMesh, 'sandbox', 'var(--cloud)', 0x004cff),
                getLayerUpdate(dlpMesh, 'dlp', 'var(--cloud)', 0x002aff), getLayerUpdate(ztnaMesh, 'ztna', 'var(--cloud)', 0x0008ff), getLayerUpdate(coreAuthMesh, 'core', 'var(--cloud)', 0x0000cc)
            ];

            uiUpdates.forEach(update => {
                let txt = document.getElementById('txt' + update.layer.charAt(0).toUpperCase() + update.layer.slice(1));
                let svgFill = document.getElementById('svg' + update.layer.charAt(0).toUpperCase() + update.layer.slice(1));
                
                if(txt && svgFill) {
                    txt.innerText = update.pctText + (update.pctText === "OFFLINE" ? "" : "%"); 
                    txt.style.color = update.barColor;
                    txt.style.textShadow = `0 0 10px ${update.barColor}, 0 0 20px ${update.barColor}`;
                    let maxOffset = 251.2; 
                    let currentOffset = maxOffset - (update.pctWidth / 100) * maxOffset;
                    svgFill.style.strokeDashoffset = currentOffset;
                    svgFill.style.stroke = update.barColor; 
                    svgFill.style.filter = `drop-shadow(0 0 8px ${update.barColor})`; 
                }
            });

            // --- UPDATE VAULT HUD & SYNC ---
            const vVal = document.getElementById('vault-val');
            const vStat = document.getElementById('vault-status');
            
            if (state.serverBreached === false && state.vault.remaining === 10000) {
                state.vault.status = 'SECURE';
            }

            if(vVal && vStat) {
                vStat.innerText = "[ " + state.vault.status + " ]";
                
                if (state.vault.status === 'SECURE') {
                    vVal.innerText = Math.floor(state.vault.remaining) + " / 10000 TB";
                    vVal.style.color = '#fff'; vVal.style.textShadow = '0 0 15px #00f3ff';
                    vStat.style.color = '#00f3ff';
                } else if (state.vault.status.includes('LOCKED')) {
                    vVal.innerText = "0x" + Math.random().toString(16).substr(2, 8).toUpperCase() + " (ENCRYPTED)";
                    vVal.style.color = '#ff1744'; vVal.style.textShadow = '0 0 15px #ff1744';
                    vStat.style.color = '#ff1744';
                } else {
                    vVal.innerText = Math.max(0, Math.floor(state.vault.remaining)) + " / 10000 TB";
                    vVal.style.color = '#ffea00'; vVal.style.textShadow = '0 0 15px #ffea00';
                    vStat.style.color = '#ffea00';
                }
            }

            if (now - state.lastLogTime > 100) {
                // Sending data back to Python/Telemetry over Socket.IO
                socket.emit('omni_sync', { cmd: 'syncVault', remaining: state.vault.remaining, status: state.vault.status });
                state.lastLogTime = now;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
